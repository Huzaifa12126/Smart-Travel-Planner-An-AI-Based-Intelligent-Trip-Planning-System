<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login | Smart Travel Planner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --glass: rgba(255, 255, 255, 0.08); --bg-grad: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%); }
        body { font-family: 'Inter', sans-serif; background: var(--bg-grad); height: 100vh; display: flex; align-items: center; justify-content: center; color: white; }
        
        .auth-card { 
            width: 400px; padding: 40px; background: var(--glass); backdrop-filter: blur(20px); 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            animation: fadeIn 0.8s ease-out;
        }
        
        .form-control { 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); 
            color: white; border-radius: 12px; padding: 12px; margin-bottom: 20px;
        }
        .form-control:focus { background: rgba(255,255,255,0.1); color: white; border-color: #3b82f6; box-shadow: none; }
        .form-control::placeholder { color: rgba(255,255,255,0.4); }

        .btn-auth { 
            background: #3b82f6; border: none; padding: 12px; border-radius: 12px; 
            font-weight: 600; transition: 0.3s; width: 100%;
        }
        .btn-auth:hover { background: #2563eb; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(59,130,246,0.3); }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="auth-card">
        <h2 class="text-center mb-2">Welcome Back</h2>
        <p class="text-center text-secondary small mb-4">Login to access your saved trips</p>
        
        <form action="/login" method="POST">
            <label class="small mb-1 opacity-75">Username</label>
            <input type="text" name="username" class="form-control" placeholder="Enter username" required>
            
            <label class="small mb-1 opacity-75">Password</label>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            
            <button type="submit" class="btn btn-primary btn-auth mt-2">Login</button>
        </form>
        
        <div class="text-center mt-4">
            <p class="small opacity-75">New here? <a href="/signup" class="text-info text-decoration-none fw-bold">Create Account</a></p>
        </div>
    </div>
</body>
</html>
